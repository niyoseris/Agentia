<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Agentia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa;
      --bg2: #ffffff;
      --bg3: #eef0f7;
      --border: #dde1f0;
      --accent: #5b52e8;
      --green: #1a9e5c;
      --red: #d63031;
      --text: #1a1d2e;
      --text2: #4a5080;
      --text3: #8890b0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 260px;
      padding: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6c63ff, #4a90e2);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: white;
    }
    .header-title { font-weight: 600; font-size: 14px; flex: 1; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%; background: var(--text3);
    }
    .status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.err { background: var(--red); }

    .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    .url-row {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.2s;
    }
    .btn-panel { background: var(--accent); color: white; }
    .btn-panel:hover { background: #574fd6; }

    .btn-record {
      background: rgba(231, 76, 60, 0.12);
      color: var(--red);
      border: 1px solid rgba(231, 76, 60, 0.3);
    }
    .btn-record:hover { background: var(--red); color: white; }
    .btn-record.active {
      background: var(--red); color: white;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(231,76,60,0); }
    }

    .last-rec {
      font-size: 11px;
      color: var(--text3);
      padding: 6px 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: none;
    }
    .last-rec.visible { display: block; }

    .model-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text3);
    }
    .model-chip {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">A</div>
    <span class="header-title">Agentia</span>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <div class="body">
    <div class="url-row" id="url-row">—</div>

    <div class="model-row">
      <span>Model</span>
      <span class="model-chip" id="model-chip">—</span>
    </div>

    <button class="btn btn-panel" id="panel-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      Paneli Aç
    </button>

    <button class="btn btn-record" id="rec-btn">
      ⏺ Kayıt Başlat
    </button>

    <div class="last-rec" id="last-rec"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
